<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'pt-BR' }}">

  {%- include head.html -%}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy:    #0d1b2a;
      --teal:    #1a6b72;
      --gold:    #c9a84c;
      --cream:   #f7f3ed;
      --muted:   #6b7280;
      --border:  #ddd5c8;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--cream);
      color: var(--navy);
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 17px;
      line-height: 1.75;
    }

    /* ── HEADER ─────────────────────────────────────── */
    .site-header {
      background: var(--navy);
      border-bottom: 3px solid var(--gold);
      padding: 0;
    }

    .site-header .wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 64px;
    }

    .site-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff !important;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }
    .site-title:hover { color: var(--gold) !important; }

    .site-nav .page-link {
      font-family: 'Source Serif 4', serif;
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #ccc !important;
      text-decoration: none;
      margin-left: 2rem;
      transition: color 0.2s;
    }
    .site-nav .page-link:hover { color: var(--gold) !important; }

    /* ── HERO BANNER ─────────────────────────────────── */
    .hero {
      background: linear-gradient(135deg, var(--navy) 0%, #143040 60%, #0e3d45 100%);
      color: #fff;
      padding: 4.5rem 2rem 3.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 40px,
          rgba(201,168,76,0.04) 40px,
          rgba(201,168,76,0.04) 41px
        );
    }
    .hero-inner { position: relative; z-index: 1; }
    .hero-label {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid var(--gold);
      padding: 0.25rem 0.9rem;
      border-radius: 2px;
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.1s;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      margin: 0 0 0.5rem;
      line-height: 1.15;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.25s;
    }
    .hero-subtitle {
      font-size: 1rem;
      font-weight: 300;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.04em;
      margin-top: 0.4rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.4s;
    }
    .hero-divider {
      width: 48px;
      height: 2px;
      background: var(--gold);
      margin: 1.6rem auto 0;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.55s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── MAIN CONTENT ────────────────────────────────── */
    .page-content { padding: 3rem 2rem; }
    .page-content .wrapper {
      max-width: 820px;
      margin: 0 auto;
    }

    /* ── PROFILE LINKS CARD ──────────────────────────── */
    .profile-section {
      background: #fff;
      border: 1px solid var(--border);
      border-top: 4px solid var(--teal);
      border-radius: 4px;
      padding: 2.4rem 2.8rem;
      box-shadow: 0 2px 18px rgba(13,27,42,0.07);
    }

    .profile-section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--navy);
      margin: 0 0 0.3rem;
      letter-spacing: 0.01em;
    }
    .profile-section .section-sub {
      font-size: 0.85rem;
      color: var(--muted);
      margin: 0 0 2rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .profile-links {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1rem;
    }

    .profile-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      padding: 1.2rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      text-decoration: none;
      color: var(--navy);
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 400;
      transition: all 0.22s ease;
      background: var(--cream);
      text-align: center;
    }
    .profile-link:hover {
      border-color: var(--teal);
      background: #fff;
      color: var(--teal);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(26,107,114,0.15);
    }
    .profile-link img {
      width: 28px;
      height: 28px;
      opacity: 0.7;
      transition: opacity 0.2s;
      filter: none;
    }
    .profile-link:hover img { opacity: 1; }

    /* ── POSTS LIST ──────────────────────────────────── */
    .post-list-heading {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--navy);
      margin: 3rem 0 1.2rem;
      padding-bottom: 0.6rem;
      border-bottom: 2px solid var(--border);
    }

    .post-list { list-style: none; padding: 0; margin: 0; }
    .post-list li {
      padding: 1.2rem 0;
      border-bottom: 1px solid var(--border);
    }
    .post-meta {
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .post-link {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--navy);
      text-decoration: none;
      transition: color 0.2s;
    }
    .post-link:hover { color: var(--teal); }

    /* ── FOOTER ──────────────────────────────────────── */
    .site-footer {
      background: var(--navy);
      color: rgba(255,255,255,0.55);
      border-top: 3px solid var(--gold);
      padding: 2.2rem 2rem;
      font-size: 0.82rem;
      letter-spacing: 0.03em;
    }
    .site-footer .wrapper {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      align-items: center;
      justify-content: space-between;
    }
    .site-footer a {
      color: rgba(255,255,255,0.65);
      text-decoration: none;
      transition: color 0.2s;
    }
    .site-footer a:hover { color: var(--gold); }
    .contact-list { list-style: none; padding: 0; margin: 0; }
    .contact-list li { margin-bottom: 0.3rem; }
    .footer-col-wrapper { display: contents; }
    .footer-col { min-width: 0; }

    /* ── RESPONSIVE ──────────────────────────────────── */
    @media (max-width: 600px) {
      .hero { padding: 3rem 1.5rem 2.5rem; }
      .profile-section { padding: 1.6rem 1.4rem; }
      .profile-links { grid-template-columns: repeat(2, 1fr); }
      .site-nav .page-link { margin-left: 1rem; }
    }
  </style>

  <body>

    {%- include header.html -%}

    {% if page.url == '/' or page.url == '/ufes/' %}
    <div class="hero">
      <div class="hero-inner">
        <span class="hero-label">UFES — São Mateus</span>
        <h1>Prof. Thonimar V. Alencar</h1>
        <p class="hero-subtitle">Departamento de Ciências Naturais &nbsp;·&nbsp; Física</p>
        <div class="hero-divider"></div>
      </div>
    </div>
    {% endif %}

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {%- include footer.html -%}

  </body>

</html>
